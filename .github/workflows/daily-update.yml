name: 每日自动更新世界杯数据

on:
  schedule:
    # 北京时间 08:00 / 14:00 / 22:00（UTC 00:00 / 06:00 / 14:00）
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: '强制提交（即使数据无变化）'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-match-data:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 检查 API Key
        run: |
          if [ -z "${{ secrets.API_FOOTBALL_KEY }}" ]; then
            echo "❌ 未配置 API_FOOTBALL_KEY Secret"
            echo "请在 GitHub → Settings → Secrets → Actions 中添加"
            exit 1
          fi
          echo "✅ API Key 已配置"

      - name: 运行 API-Football 数据抓取脚本
        env:
          API_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          echo "🔄 开始更新，北京时间：$(TZ=Asia/Shanghai date)"
          node scripts/update-data.js
          echo "✅ 脚本执行完毕"

      - name: 检查是否有数据更新
        id: check
        run: |
          CHANGED=false
          for f in js/live-data.js js/matches-data.js; do
            if ! git diff --quiet "$f" 2>/dev/null; then
              CHANGED=true
              echo "✅ $f 有变化"
            fi
          done
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: 提交并推送更新
        if: steps.check.outputs.changed == 'true' || github.event.inputs.force_update == 'true'
        run: |
          git config user.name "WC2026-Bot"
          git config user.email "bot@worldcup2026.auto"
          git add js/live-data.js js/matches-data.js
          git commit -m "🤖 自动更新 $(TZ=Asia/Shanghai date +'%m月%d日 %H:%M') 北京时间"
          git push origin HEAD
          echo "🚀 已推送，GitHub Pages 将自动部署"

      - name: 完成摘要
        run: |
          echo "📅 北京时间：$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')"
          echo "✅ 工作流完成"
