name: 每日自动更新世界杯数据

on:
  schedule:
    # 每天北京时间 08:00 自动运行（UTC 00:00）
    - cron: '0 0 * * *'
  # 也可以在 GitHub 网页手动点击运行
  workflow_dispatch:

jobs:
  update-match-data:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 运行数据抓取脚本
        env:
          # 可选：在 GitHub Secrets 里设置 API_KEY
          # 不设置也能运行（使用免费的 TheSportsDB）
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/fetch-matches.js

      - name: 检查是否有数据更新
        id: check
        run: |
          if git diff --quiet js/matches-data.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 提交并推送更新
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "WC2026 Bot"
          git config user.email "bot@worldcup2026.auto"
          git add js/matches-data.js
          git commit -m "🤖 自动更新 $(date +'%Y-%m-%d %H:%M') UTC 赛事数据"
          git push
